<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Log in · Calorie Rhythm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #050816;
        --card-bg: #0f172a;
        --accent: #38bdf8;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --danger: #f97373;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top, #1f2937 0, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: radial-gradient(circle at top left, #1f2937 0, #020617 55%);
        border-radius: 18px;
        padding: 28px 24px 24px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 4px; }
      .subtle { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; }
      .error { font-size: 0.85rem; color: var(--danger); margin-bottom: 12px; }
      form { display: flex; flex-direction: column; gap: 10px; }
      label { font-size: 0.8rem; color: var(--muted); }
      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.9);
        color: var(--text);
        font: inherit;
      }
      input:focus { outline: none; border-color: var(--accent); }
      button {
        margin-top: 4px;
        border: none;
        border-radius: 999px;
        padding: 9px 0;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        background: linear-gradient(135deg, #38bdf8, #4f46e5);
        color: #e0f2fe;
      }
      .footer { margin-top: 16px; font-size: 0.8rem; color: var(--muted); text-align: center; }
      .footer a { color: var(--accent); text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome back</h1>
      <p class="subtle">Log in to your Calorie Rhythm account</p>

      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}

      <form method="post">
        <div>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit">Log in</button>
      </form>

      <p class="footer">No account? <a href="{{ url_for('register') }}">Create one</a></p>
    </div>
  </body>
</html>
