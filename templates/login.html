{% extends "base.html" %}

{% block body %}
<main style="display: flex; justify-content: center; align-items: flex-start; padding-top: 40px;">
  <section class="card" style="width: 100%; max-width: 400px;">
    <div class="card-header">
      <div>
        <div class="card-title">Sign in</div>
        <div class="subtle">Welcome back — track your day.</div>
      </div>
    </div>

    {% if error %}
    <p style="color: var(--danger); font-size: 0.85rem; margin: 0 0 10px;">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
      <div>
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="your username"
          autocomplete="username"
          required
        />
      </div>

      <div>
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="actions">
        <button type="submit">Sign in</button>
      </div>
    </form>

    <p style="font-size: 0.8rem; color: var(--muted); margin-top: 14px; text-align: center;">
      No account yet?
      <a href="{{ url_for('register') }}" style="color: var(--accent); text-decoration: none;">Create one</a>
    </p>
  </section>
</main>
{% endblock %}
