{% extends "base.html" %}

{% block body %}
<main>
  <section class="card">
    <div class="card-header">
      <div>
        <div class="card-title">Last 7 days</div>
        <div class="subtle">Tap a day to open its log</div>
      </div>
    </div>

    {% if days %}
    <ul class="history-list">
      {% for d in days %}
      <li class="history-item">
        <div>
          <div>
            <a href="{{ url_for('day_view', day_str=d.day) }}">{{ d.day }}</a>
          </div>
          <div class="subtle">{{ d.items }} item(s)</div>
        </div>
        <div>{{ d.total_calories }} kcal</div>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="list-empty">No history yet — log something today first.</p>
    {% endif %}
  </section>
</main>
{% endblock %}
