<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Calorie Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #050816;
        --card-bg: #0f172a;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.15);
        --text: #e5e7eb;
        --muted: #9ca3af;
        --danger: #f97373;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          sans-serif;
        background: radial-gradient(circle at top, #1f2937 0, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      .shell {
        width: 100%;
        max-width: 960px;
        padding: 32px 16px 40px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .app-title {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pill {
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      nav {
        display: flex;
        gap: 6px;
        font-size: 0.85rem;
        flex-wrap: wrap;
      }

      nav a {
        color: var(--muted);
        text-decoration: none;
        padding: 4px 9px;
        border-radius: 999px;
        border: 1px solid transparent;
        transition: background 0.15s ease, color 0.15s ease,
          border-color 0.15s ease;
      }

      nav a:hover {
        background: rgba(15, 23, 42, 0.9);
        border-color: rgba(148, 163, 184, 0.6);
        color: var(--text);
      }

      nav a.active {
        background: var(--accent-soft);
        border-color: rgba(56, 189, 248, 0.7);
        color: #e0f2fe;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 2.1fr) minmax(0, 1.4fr);
        gap: 18px;
      }

      @media (max-width: 800px) {
        main {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      .card {
        background: radial-gradient(circle at top left, #1f2937 0, #020617 55%);
        border-radius: 18px;
        padding: 18px 18px 16px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 12px;
        gap: 8px;
      }

      .card-title {
        font-size: 0.95rem;
        font-weight: 600;
      }

      .subtle {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
        max-height: 360px;
        overflow-y: auto;
        scrollbar-width: thin;
      }

      .list-empty {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .entry {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 6px 0;
        border-bottom: 1px solid rgba(30, 64, 175, 0.4);
      }

      .entry:last-child {
        border-bottom: none;
      }

      .entry-main {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .entry-meta {
        display: flex;
        gap: 8px;
        font-size: 0.75rem;
        color: var(--muted);
      }

      .entry-notes {
        font-size: 0.8rem;
        color: #e5e7eb;
      }

      .entry-cal {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--accent);
        white-space: nowrap;
      }

      .total-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(148, 163, 184, 0.4);
        font-size: 0.95rem;
      }

      .tag {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      label {
        font-size: 0.8rem;
        color: var(--muted);
      }

      input,
      textarea {
        width: 100%;
        padding: 7px 9px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.9);
        color: var(--text);
        font: inherit;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
      }

      textarea {
        min-height: 58px;
        resize: vertical;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 4px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 7px 14px;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        background: linear-gradient(135deg, #38bdf8, #4f46e5);
        color: #e0f2fe;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.9);
        transition: transform 0.08s ease, box-shadow 0.08s ease,
          filter 0.08s ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.04);
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.95);
      }

      button:active {
        transform: translateY(0);
        box-shadow: 0 7px 18px rgba(15, 23, 42, 0.9);
      }

      .history-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.85rem;
      }

      .history-item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 7px 9px;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.3);
      }

      .history-item a {
        color: inherit;
        text-decoration: none;
      }

      .history-item a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="app-title">
          <span>Calorie Rhythm</span>
          <span class="pill">Daily check-in</span>
        </div>
        <nav>
          {% if username %}
          <a href="{{ url_for('index') }}" class="{% if active == 'today' %}active{% endif %}"
            >Today</a
          >
          <a href="{{ url_for('history') }}" class="{% if active == 'history' %}active{% endif %}"
            >7‑day history</a
          >
          <span style="color: var(--muted); font-size: 0.8rem; padding: 4px 6px; align-self: center;">{{ username }}</span>
          <a href="{{ url_for('logout') }}" style="color: var(--muted);">Sign out</a>
          {% else %}
          <a href="{{ url_for('login') }}">Sign in</a>
          <a href="{{ url_for('register') }}">Register</a>
          {% endif %}
        </nav>
      </header>

      {% block body %}{% endblock %}
    </div>
  </body>
  </html>
